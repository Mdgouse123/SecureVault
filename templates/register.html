{% extends 'base.html' %}
{% block title %}Register – SecureVault{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h2>Create Account</h2>
      <p>Join SecureVault to protect your files</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username"
               required minlength="3" maxlength="80" autocomplete="username"/>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com"
               required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="password" name="password" placeholder="Min. 8 characters"
                 required minlength="8" autocomplete="new-password"/>
          <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
        </div>
        <div class="pw-strength-wrap">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwStrengthFill"></div></div>
          <span class="pw-strength-label" id="pwStrengthLabel"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <div class="input-with-toggle">
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Repeat password" required autocomplete="new-password"/>
          <button type="button" class="toggle-pw" onclick="togglePassword('confirm_password')">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
